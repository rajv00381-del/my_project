<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
            <div>
                <h3>Exeperiment Six | Addition of Two Numbers</h3>
                <input type="number" id="num1" placeholder="Enter first number">
                <input type="number" id="num2" placeholder="Enter second number">       
                <button onclick="add()">Add</button>
                <p id="result"></p>
            </div> 
    <hr>
            <!--Even Odd-->
            <div>
                <h3>Exeperiment Seven | <b>Check Even Or Odd Number</b></h3>
                <input type="number" id="even_odd" placeholder="Enter number"> 
                <button onclick="EvenOdd()">Check</button>
                <hr>
                <p id="even-odd"></p>
            </div>
            <!--Larget in two numbers-->
            <div>
                <h3>Exeperiment Eight | <b>Find Largest of Two Numbers</b></h3>
                <input type="number" id="largest1" placeholder="Enter first number">
                <input type="number" id="largest2" placeholder="Enter second number">
                <button onclick="findLargest()">Find Largest</button>
                <hr>
                <p id="largest-result"></p>
            </div>
            <!--Factorial-->
            <div>
                <h3>Exeperiment Nine | <b>Find Factorial of a Number</b></h3>
                <input type="number" id="factorial" placeholder="Enter number">
                <button onclick="findFactorial()">Find Factorial</button>
                <hr>
                <p id="factorial-result"></p>
            </div>
            <!--Sum of first n numbers-->
            <div>
                <h3>Exeperiment Ten | <b>Find Sum of First N Natural Numbers</b></h3>
                <input type="number" id="sum_natural" placeholder="Enter number">
                <button onclick="sumNatural()">Find Sum</button>
                <hr>
                <p id="sum-result"></p>
            </div>
            <!-- Palindrome Number -->
            <div>
                <h3>Exeperiment Eleven | <b>Check if a Number is Palindrome</b></h3>
                <input type="number" id="palindrome" placeholder="Enter number">
                <button onclick="checkPalindrome()">Check</button>
                <hr>
                <p id="palindrome-result"></p>
            </div>
    </div>
    <script src="index.js"></script>

</body>
</html>
