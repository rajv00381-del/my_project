<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
    <!--Heaber bar-->
        <div class="header">
            <img src="../call_icon.png" alt="Calling">
            <h3>AVIKESH</h3>
            <hr>
            <div class="title">
                <ul class="nav">
                    <li>HOME</li>
                    <li>PROFILE</li>
                    <li>ABOUTS</li>
                    <li class="dropdown">
                        SERVICES
                        <ul class="dropdown-item">
                            <li>Home</li>
                            <li>Profile</li>
                            <li>Services</li>
                            <li>Login</li>
                        </ul>
                    </li>
                    <li>CONTACTS</li>
                </ul>
            </div>
        </div>
        <!--Body-->
        <div class="contents">
            <!--Smart Calculator-->
            <div id="calculator-container" align="center">
                <h4> Advanced Calculator</h4>
                    <div class="result-section">
                        <input type="text" id="calculator-inputs" disabled>
                        <input type="text" id="calculator-results" placeholder="0" disabled>
                    </div><hr>
                    <div class="keys">
                        <table>
                            <tr>
                                <td><button class="keys">AC</button></td>
                                <td><button class="keys">DEL</button></td>
                                <td><button class="keys">%</button></td>
                                <td><button class="keys">/</button></td>
                            </tr>
                            <tr>
                                <td><button class="keys">7</button></td>
                                <td><button class="keys">8</button></td>
                                <td><button class="keys">9</button></td>
                                <td><button class="keys">*</button></td>
                            </tr>
                            <tr>
                                <td><button class="keys">4</button></td>
                                <td><button class="keys">5</button></td>
                                <td><button class="keys">6</button></td>
                                <td><button class="keys">-</button></td>
                            </tr>
                            <tr>
                                <td><button class="keys">1</button></td>
                                <td><button class="keys">2</button></td>
                                <td><button class="keys">3</button></td>
                                <td><button class="keys">+</button></td>
                            </tr>
                            <tr>
                                <td><button class="keys">PRE</button></td>
                                <td><button class="keys">0</button></td>
                                <td><button class="keys">.</button></td>
                                <td><button class="keys">=</button></td>
                        </table>
            </div>
        </div>

</div>

    <script src="./main.js"></script>
</body>
</html>
